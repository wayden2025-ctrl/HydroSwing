<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>HydroSwing</title>
  <link rel="stylesheet" href="styles.css?v=49" />
</head>
<body>
  <div id="game">
    <canvas id="canvas"></canvas>

    <!-- ============ Landing screen (chrome over the canvas) ============ -->
    <div id="menu" class="landing">
      <!-- Top-left: the one and only button -->
      <button id="settingsBtn" class="glass-btn" aria-label="Settings">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="#eafcff" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3.2"/><path d="M12 3v2.5M12 18.5V21M3 12h2.5M18.5 12H21M5.6 5.6l1.8 1.8M16.6 16.6l1.8 1.8M18.4 5.6l-1.8 1.8M7.4 16.6l-1.8 1.8"/></svg>
      </button>

      <!-- Top-right: gems + best distance -->
      <div class="top-right">
        <div class="glass-panel"><svg class="ico ico-ruby" viewBox="0 0 24 24"><path d="M12 2 L22 9 L12 22 L2 9 Z" fill="#e0234a"/><path d="M12 2 L22 9 L12 11 L2 9 Z" fill="#ff5c7a"/></svg><span id="gemCount">0</span></div>
        <div class="glass-panel"><svg class="ico" viewBox="0 0 24 24"><path d="M12 2l2.9 6 6.6.6-5 4.4 1.5 6.4L12 16.9 5.9 19.9 7.4 13.5l-5-4.4 6.6-.6z" fill="#6bf0d8"/></svg><span id="bestCount">0</span><small>m</small></div>
      </div>

      <!-- Settings popover -->
      <div id="settingsPanel" class="glass-panel settings-pop hidden">
        <div class="set-row"><span>Sound</span><button id="muteBtn" class="toggle">ON</button></div>
      </div>

      <!-- Logo -->
      <div class="logo-wrap">
        <h1 class="logo" data-text="HYDROSWING">HYDRO<span>SWING</span></h1>
      </div>

      <!-- Start prompt -->
      <div class="start-wrap">
        <p class="press-start">PRESS SPACE TO START</p>
      </div>
    </div>

    <!-- ============ In-game HUD (centered scoreboard + gem counter) ============ -->
    <div id="hud" class="hud">
      <div class="scoreboard">
        <div class="score-dist"><span id="hudDist">0</span><label>m</label></div>
        <div class="score-gems"><svg class="ico ico-ruby" viewBox="0 0 24 24"><path d="M12 2 L22 9 L12 22 L2 9 Z" fill="#e0234a"/><path d="M12 2 L22 9 L12 11 L2 9 Z" fill="#ff5c7a"/></svg><span id="hudGems">0</span></div>
      </div>
    </div>

    <!-- ============ Game Over ============ -->
    <div id="gameover" class="overlay gameover hidden">
      <h2 class="go-title" data-text="RUN OVER">RUN<span>OVER</span></h2>
      <div class="go-panel">
        <span id="goNewBest" class="go-newbest hidden">NEW BEST</span>

        <!-- Hero: distance travelled this run -->
        <div class="go-hero">
          <div class="go-dist"><span id="goDist">0</span><em>m</em></div>
          <div class="go-heroLabel">Distance</div>
        </div>

        <!-- Best -->
        <div class="go-best">
          <svg class="ico" viewBox="0 0 24 24"><path d="M12 2l2.9 6 6.6.6-5 4.4 1.5 6.4L12 16.9 5.9 19.9 7.4 13.5l-5-4.4 6.6-.6z" fill="#6bf0d8"/></svg>
          <span class="go-bestLabel">Best</span>
          <b id="goBest">0</b><i>m</i>
        </div>

        <div class="go-actions">
          <button id="againBtn" class="btn">PLAY AGAIN</button>
          <button id="homeBtn" class="btn btn-ghost">HOME</button>
        </div>
        <p class="hint">Press <kbd>Space</kbd> to restart</p>
      </div>
    </div>
  </div>

  <!-- Systems (classic scripts, loaded in dependency order).
       ?v= cache-buster — bump when shipping JS changes. -->
  <script src="js/utils.js?v=49"></script>
  <script src="js/environment.js?v=49"></script>
  <script src="js/effects.js?v=49"></script>
  <script src="js/river.js?v=49"></script>
  <script src="js/swing.js?v=49"></script>
  <script src="js/player.js?v=49"></script>
  <script src="js/camera.js?v=49"></script>
  <script src="js/ui.js?v=49"></script>
  <script src="js/game.js?v=49"></script>
</body>
</html>
